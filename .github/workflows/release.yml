name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # Triggers on tags like v1.0.0, v2.1.3, etc.
  # Optional: Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual release'
        required: false

jobs:
  # First, run tests to ensure the release is safe
  test:
    uses: ./.github/workflows/ci.yml  # Reuse your CI workflow
    secrets: inherit

  # Then build and publish if tests pass
  build-and-publish:
    needs: [test]  # Only publish if tests pass
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing (PyPI)
      contents: read

    steps:
      - uses: actions/checkout@v4  # Updated to v4
        with:
          fetch-depth: 0  # Fetch all history for version detection

      - uses: actions/setup-python@v5  # Updated to v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package with twine (dry run)
        run: twine check dist/*

      - name: List built artifacts
        run: ls -la dist/

      # Option 1: Using API token (your current method)
      - name: Publish to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # Option 2: Trusted publishing (more secure, recommended)
      # Uncomment below and remove the twine upload step above
      # - name: Publish to PyPI with trusted publishing
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: dist/

  # Optional: Create GitHub Release
  github-release:
    needs: [ build-and-publish ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz